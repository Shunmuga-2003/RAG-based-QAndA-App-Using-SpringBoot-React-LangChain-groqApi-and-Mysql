version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_URL=http://chromadb:8000

  frontend:
    build: ./frontend
    ports: ["3000:3000"]

  chromadb:
    image: chromadb/chroma
    ports: ["8000:8000"]

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_PASSWORD: secret